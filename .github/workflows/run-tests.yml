name: Run smoke test

# Drop permissions to minimum for security
permissions:
  contents: read

on:
  pull_request:
  push:
  schedule:
    - cron: '0 16 * * 5'  # Every Friday 4pm
  workflow_dispatch:

jobs:
  smoke_test:
    name: Run the test suite
    strategy:
      matrix:
        python-version: ["3.10", 3.14]  # no particular need for in-between versions
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
    - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1  # v6.3.0
      with:
        python-version: ${{ matrix.python-version }}
    - name: Run smoke test
      run: |
        set -x
        python3 --version
        ./Caddyfile.generate --config sites.cfg.EXAMPLE --saltstack > actual-output.txt
        diff -u0 \
            <(tail -n +3 .github/workflows/expected-output.txt) \
            <(tail -n +3 actual-output.txt)
